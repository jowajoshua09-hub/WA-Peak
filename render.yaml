services:
  - type: web
    name: peak-md-bot
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install --no-audit --no-fund
    startCommand: sh -c "node telegramPairBot.js & node index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"   # ⚠️ EXACT VERSION, not just "20"
      - key: NODE_ENV
        value: production
